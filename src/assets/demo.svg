<svg width="520" height="400" viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="520" height="400" fill="#ffffff"/>

  <!-- POS Screen -->
  <rect x="300" y="100" width="160" height="120" rx="12" fill="#111"/>
  <rect x="310" y="110" width="140" height="90" rx="8" fill="#fff"/>

  <!-- Screen UI -->
  <rect x="310" y="110" width="140" height="20" fill="#FF6B35"/>
  <rect x="320" y="140" width="80" height="8" fill="#ddd"/>
  <rect x="320" y="155" width="100" height="8" fill="#ddd"/>
  <rect x="320" y="170" width="60" height="8" fill="#ddd"/>
  <rect x="320" y="185" width="70" height="10" fill="#FF6B35"/>

  <!-- Character Body -->
  <rect x="140" y="170" width="80" height="100" rx="20" fill="#FF6B35"/>

  <!-- Head -->
  <circle cx="180" cy="140" r="30" fill="#FFD6B0"/>

  <!-- Eyes -->
  <circle cx="170" cy="135" r="3" fill="#111"/>
  <circle cx="190" cy="135" r="3" fill="#111"/>

  <!-- Smile -->
  <path d="M170 150 Q180 160 190 150" stroke="#111" stroke-width="2" fill="none"/>

  <!-- Arm pointing -->
  <rect x="210" y="180" width="60" height="14" rx="7" fill="#FFD6B0"/>

  <!-- Hand -->
  <circle cx="270" cy="187" r="8" fill="#FFD6B0"/>

  <!-- Tablet in hand -->
  <rect x="250" y="170" width="40" height="30" rx="5" fill="#111"/>
  <rect x="255" y="175" width="30" height="20" fill="#fff"/>

  <!-- Floating Elements -->
  <circle cx="100" cy="100" r="18" fill="#FF6B35"/>
  <text x="92" y="105" font-size="12" fill="#fff">₹</text>

  <circle cx="420" cy="80" r="16" fill="#111"/>
  <text x="414" y="85" font-size="10" fill="#FF6B35">✔</text>

  <circle cx="420" cy="300" r="18" fill="#FF6B35"/>
  <text x="412" y="305" font-size="12" fill="#fff">⚡</text>

</svg>