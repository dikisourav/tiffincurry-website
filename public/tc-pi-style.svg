<svg width="220" height="160" viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradient similar to modern tech brands -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Top bar (π style / T crossbar) -->
  <rect x="20" y="20" width="180" height="20" rx="10" fill="url(#grad)" />

  <!-- Left leg (T stem) -->
  <rect x="50" y="40" width="20" height="90" rx="10" fill="url(#grad)" />

  <!-- Curved C leg forming the π feel -->
  <path
    d="M140 40 
       C110 40, 95 65, 95 85
       C95 110, 115 130, 145 130
       C160 130, 175 122, 180 110"
    stroke="url(#grad)"
    stroke-width="20"
    fill="none"
    stroke-linecap="round"
  />

</svg>